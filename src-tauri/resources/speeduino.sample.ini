; SPDX-License-Identifier: GPL-3.0-or-later
;
; Bundled Speeduino sample INI for the simulator demo.
; Plain (unframed) protocol — matches EcuSimulator::new().
;
; Structure ported from the real Speeduino speeduino.ini (GPL-3).
; Reference: https://github.com/noisymime/speeduino

[MegaTune]
   signature            = "speeduino 202504-dev"
   queryCommand         = "Q"
   versionInfo          = "S"

   ; Communication parameters
   pageActivationDelay  = 10
   blockReadTimeout     = 2000
   interWriteDelay      = 10
   blockingFactor       = 121

   endianness           = little

   ; Plain (unframed) protocol — no messageEnvelopeFormat key means Plain.
   ; Real-speeduino shape: this bare "r" is overridden by the *windowed*
   ; ochGetCommand template in [OutputChannels] below (parse_definition
   ; lifts it) — exactly how the real speeduino.ini declares the pair.
   ochGetCommand        = "r"
   pageReadCommand      = "p%2i%2o%2c"
   pageValueWrite       = "M%2i%2o%2c%v"
   burnCommand          = "b%2i"

; ─────────────────────────────────────────────────────────────────────────────
; Minimal tunable set so the simulator is page-backed (read/write/burn) and the
; M2 data-driven dialog engine has real fields to render. One page, one scalar,
; one bitfield selector, and a second scalar gated by a visibility expression.
; Field syntax is copied from the real Speeduino speeduino.ini (GPL-3).
; ─────────────────────────────────────────────────────────────────────────────

[Constants]
    endianness      = little
    nPages          = 4
    pageSize        = 8, 288, 288, 16

page = 1
      reqFuel    = scalar, U16,  0,        "ms",   0.1,  0.0,  0.0,  6553.5,  1
      injLayout  = bits,   U08,  2, [0:1], "Paired", "Semi-Sequential", "Banked", "Sequential"
      crankRPM   = scalar, U16,  4,        "rpm",  1.0,  0.0,  0.0,  6000.0,  0

; ─────────────────────────────────────────────────────────────────────────────
; M4 Task 9: the VE table the simulator's engine reads each tick (see
; crates/simulator/src/ve_model.rs) plus its bins, and the AFR target table
; bound alongside it under [VeAnalyze] below. Field syntax and layout are
; copied from the real Speeduino speeduino.ini (GPL-3).
; ─────────────────────────────────────────────────────────────────────────────

page = 2
      veTable      = array,  U08,   0, [16x16], "%",   1.0,   0.0,   0.0,   255.0, 0
      rpmBins      = array,  U08, 256, [16],   "RPM", 100.0,  0.0, 100.0, 25500.0, 0
      fuelLoadBins = array,  U08, 272, [16],   "kPa",   1.0,  0.0,   0.0,   255.0, 0

page = 3
      afrTable    = array,  U08,   0, [16x16], "AFR",   0.1,  0.0,   7.0,    25.5, 1
      rpmBinsAFR  = array,  U08, 256, [16],   "RPM", 100.0,  0.0, 100.0, 25500.0, 0
      loadBinsAFR = array,  U08, 272, [16],   "kPa",   1.0,  0.0,   0.0,   255.0, 0

page = 4
      warmupBins   = array, U08,  0, [6], "C", 1.0, 0.0, 0.0, 255.0, 0
      warmupValues = array, U08,  6, [6], "%", 1.0, 0.0, 0.0, 255.0, 0

[Menu]

menuDialog = main

   menu = "&Tuning"
      subMenu = engine_dialog, "Engine Constants"

[UserDefined]

    dialog = engine_dialog, "Engine Constants"
        field = "Required Fuel",   reqFuel
        field = "Injector Layout", injLayout
        field = "Cranking RPM",    crankRPM, { injLayout != 0 }

; ─────────────────────────────────────────────────────────────────────────────
; M3 realtime dashboard (Task 8). Channel offsets/types/scales mirror what the
; animated simulator engine encodes (crates/simulator/src/och_codec.rs) and
; are trimmed from the real Speeduino speeduino.ini (GPL-3) — same set as the
; realtime-owner test fixture. The windowed ochGetCommand template here
; overrides the bare [MegaTune] "r" above, exercising the real-world lift.
; ─────────────────────────────────────────────────────────────────────────────

[OutputChannels]
ochGetCommand    = "r\$tsCanId\x30%2o%2c"
ochBlockSize     = 16

secl        = scalar, U08,  0, "sec",   1.000, 0.000
engine      = scalar, U08,  2, "bits",  1.000, 0.000
running     = bits,   U08,  2, [0:0]
rpm         = scalar, U16,  4, "rpm",   1.000, 0.000
coolantRaw  = scalar, U08,  6, "C",     1.000, 0.000
tps         = scalar, U08,  7, "%",     0.500, 0.000
coolant     = { coolantRaw - 40 }, "C"
throttle    = { tps }, "%"

; M4 Task 9: measured AFR + its EGO correction, plus the sim's raw MAP/
; afrTarget channels the [VeAnalyze] loop below reads (bytes 8-11 were free).
map           = scalar, U08,  8, "kPa",  1.000, 0.000
afr           = scalar, U08,  9, "O2",   0.100, 0.000
egoCorrection = scalar, U08, 10, "%",    1.000, 0.000
afrTarget     = scalar, U08, 11, "O2",   0.100, 0.000
fuelLoad      = { map }, "kPa"

[GaugeConfigurations]
gaugeCategory = "Main"
;Name          = Var,      Title,          Units, Lo,  Hi,   LoD, LoW, HiW,  HiD,  vd, ld
tachometer     = rpm,      "Engine Speed", "RPM", 0,   8000, 300, 600, 6500, 7000, 0,  0
cltGauge       = coolant,  "Coolant",      "C",   -40, 215,  -15, 1,   95,   105,  0,  0
throttleGauge  = throttle, "Throttle",     "%",   0,   100,  0,   0,   90,   100,  0,  0

[FrontPage]
gauge1 = tachometer
gauge2 = cltGauge
gauge3 = throttleGauge
indicator = { running }, "Not Running", "Running", white, black, green, black

; ─────────────────────────────────────────────────────────────────────────────
; M4 Task 9: table/curve editors + the [VeAnalyze] binding that closes the
; demo's VE-correction loop (crates/simulator/src/ve_model.rs computes the
; simulator's "measured" afr from the veTable below vs. its hidden true-VE
; surface). Layout/fields copied from the real Speeduino speeduino.ini (GPL-3).
; ─────────────────────────────────────────────────────────────────────────────

[TableEditor]
   table = veTable1Tbl, veTable1Map, "VE Table", 2
      xBins       = rpmBins, rpm
      yBins       = fuelLoadBins, fuelLoad
      zBins       = veTable
      upDownLabel = "(RICHER)", "(LEANER)"
   table = afrTable1Tbl, afrTable1Map, "AFR Target Table", 3
      xBins       = rpmBinsAFR, rpm
      yBins       = loadBinsAFR, fuelLoad
      zBins       = afrTable

[CurveEditor]
   curve = warmup_curve, "Warmup Enrichment"
      columnLabel = "Coolant", "Added"
      xAxis = -40, 120, 4
      yAxis = 0, 120, 4
      xBins = warmupBins, coolant
      yBins = warmupValues

[VeAnalyze]
   veAnalyzeMap = veTable1Tbl, afrTable1Tbl, afr, egoCorrection
   filter = std_xAxisMin
   filter = std_xAxisMax
   filter = std_yAxisMin
   filter = std_yAxisMax
   filter = std_DeadLambda
   filter = minCltFilter, "Minimum CLT", coolant, <, 60, , true
