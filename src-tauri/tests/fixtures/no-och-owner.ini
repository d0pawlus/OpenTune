;
; Owner-task fixture (M5 review remediation, sub-fix 1c): the bundled sample
; INI's comms + page-1 constants, shaped like `realtime-owner.ini`, but with
; NO `[OutputChannels]` section at all. `ochBlockSize` defaults to 0 when the
; section is absent (see `opentune_ini::parser::extract_och_block_size`), so
; this exercises `start_log`'s "no realtime source" guard against a
; definition that genuinely declares none, not just a zeroed field.
;
; `ochGetCommand` is the classic bare single-byte `"A"` (not `"r"`): with no
; `[OutputChannels]` section to override it with a windowed template, `"r"`
; would reach the simulator as a truly bare byte, which
; `crates/simulator/src/ecu.rs`'s `plain_command_len` always treats as the
; start of a 7-byte windowed command — the read would stall waiting for
; bytes the client never sends. `"A"` is the original M1 single-byte
; secl-only command (`respond_plain`'s `b'A' => vec![pipe.secl]`), so the
; owner's idle-link health check keeps working with no `[OutputChannels]` at
; all, isolating this fixture to exactly the `ochBlockSize == 0` condition
; under test.

[MegaTune]
   signature            = "speeduino 202504-dev"
   queryCommand         = "Q"
   versionInfo          = "S"
   pageActivationDelay  = 0
   blockReadTimeout     = 2000
   interWriteDelay      = 0
   blockingFactor       = 121
   endianness           = little
   ochGetCommand        = "A"
   pageReadCommand      = "p%2i%2o%2c"
   pageValueWrite       = "M%2i%2o%2c%v"
   burnCommand          = "b%2i"

[Constants]
    endianness      = little
    nPages          = 1
    pageSize        = 8

page = 1
      reqFuel    = scalar, U16,  0,        "ms",   0.1,  0.0,  0.0,  6553.5,  1
