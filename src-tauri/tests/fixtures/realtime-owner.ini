;
; Owner-task realtime fixture (M3 Task 6): the bundled sample INI's comms +
; page-1 constants, plus a real-speeduino-shaped [OutputChannels] — the bare
; `ochGetCommand = "r"` lives in [MegaTune] and the *windowed* template
; (with the INI's `\$tsCanId` escape) in [OutputChannels], exercising the
; Task 6 ochGetCommand lift and the `\$` template-escape fix end to end.
; Zero comms delays keep the owner tests fast.

[MegaTune]
   signature            = "speeduino 202504-dev"
   queryCommand         = "Q"
   versionInfo          = "S"
   pageActivationDelay  = 0
   blockReadTimeout     = 2000
   interWriteDelay      = 0
   blockingFactor       = 121
   endianness           = little
   ochGetCommand        = "r"
   pageReadCommand      = "p%2i%2o%2c"
   pageValueWrite       = "M%2i%2o%2c%v"
   burnCommand          = "b%2i"

[Constants]
    endianness      = little
    nPages          = 1
    pageSize        = 8

page = 1
      reqFuel    = scalar, U16,  0,        "ms",   0.1,  0.0,  0.0,  6553.5,  1

[OutputChannels]
ochGetCommand    = "r\$tsCanId\x30%2o%2c"
ochBlockSize     =  16

secl        = scalar, U08,  0, "sec",   1.000, 0.000
engine      = scalar, U08,  2, "bits",  1.000, 0.000
running     = bits,   U08,  2, [0:0]
rpm         = scalar, U16,  4, "rpm",   1.000, 0.000
coolantRaw  = scalar, U08,  6, "C",     1.000, 0.000
tps         = scalar, U08,  7, "%",     0.500, 0.000
coolant     = { coolantRaw - 40 }, "C"
throttle    = { tps }, "%"
