; SPDX-License-Identifier: GPL-3.0-or-later
;
; Fixture for opentune-ini tests (M1 comms slice).
;
; Structure ported from the real Speeduino speeduino.ini (GPL-3-compatible).
; Reference: https://github.com/noisymime/speeduino
; Only the sections needed for M1 (comms/identify) are included; full
; constants/pages/UI sections are out of M1 scope (see ROADMAP.md §M1).
;
; The exact keywords and values below are verified against the current
; Speeduino INI (per ADR-0006: real firmware source is the truth, not the
; proprietary spec PDFs).

[MegaTune]
   signature            = "speeduino 202504-dev"
   queryCommand         = "Q"
   versionInfo          = "S"

   ; Communication parameters
   pageActivationDelay  = 10  ; ms to wait after selecting a page
   blockReadTimeout     = 2000 ; ms to wait for a block response
   interWriteDelay      = 10  ; ms between writes
   blockingFactor       = 251 ; max payload bytes per block

   endianness           = little

   ; CRC-framed protocol (msEnvelope_1.0) — length prefix + CRC32
   messageEnvelopeFormat = msEnvelope_1.0

   ; Command templates (protocol crate expands %2i/%2o/%2c/%v placeholders)
   ochGetCommand        = "r"
   pageReadCommand      = "p%2i%2o%2c"
   pageValueWrite       = "M%2i%2o%2c%v"
   burnCommand          = "b%2i"

[Constants]
   ; M1 only reads the nPages/pageSize stanza when present; full constant
   ; parsing is M2. This section is included so the parser skips it
   ; gracefully rather than erroring on an unrecognised section.
   nPages         = 10
   pageSize       = 288, 288, 288, 288, 288, 288, 288, 288, 288, 288
