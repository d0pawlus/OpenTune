;
; Fixture for opentune-ini M3 [OutputChannels] parsing (tests/output_channels.rs).
;
; [MegaTune] carries the full M1 comms field set so `parse_definition` (which
; runs `parse_comms` first) succeeds — see `speeduino_comms.ini` for the same
; template. `[OutputChannels]` below is trimmed from the real Speeduino
; `speeduino.ini` (GPL-3, https://github.com/noisymime/speeduino @ 63fd68e9),
; kept verbatim for the entries exercised: a scalar with offset/units/scale
; (secl, rpm, coolantRaw, tps), a bits channel over an existing byte
; (running, over the `engine` byte), and two computed `{ expr }` channels
; that chain off scalar channels (coolant, throttle) — the second exercises a
; bare-name expression with no arithmetic.

[MegaTune]
   signature            = "speeduino 202504-dev"
   queryCommand         = "Q"
   versionInfo          = "S"
   pageActivationDelay  = 10
   blockReadTimeout     = 2000
   interWriteDelay      = 10
   blockingFactor       = 251
   endianness           = little
   messageEnvelopeFormat = msEnvelope_1.0
   ochGetCommand        = "r"
   pageReadCommand      = "p%2i%2o%2c"
   pageValueWrite       = "M%2i%2o%2c%v"
   burnCommand          = "b%2i"

[OutputChannels]
ochGetCommand    = "r\$tsCanId\x30%2o%2c"
ochBlockSize     =  16

secl        = scalar, U08,  0, "sec",   1.000, 0.000
engine      = scalar, U08,  2, "bits",  1.000, 0.000
running     = bits,   U08,  2, [0:0]
rpm         = scalar, U16,  4, "rpm",   1.000, 0.000
coolantRaw  = scalar, U08,  6, "C",     1.000, 0.000
tps         = scalar, U08,  7, "%",     0.500, 0.000
coolant     = { coolantRaw - 40 }, "C"
throttle    = { tps }, "%"
