; SPDX-License-Identifier: GPL-3.0-or-later
;
; Golden fixture for opentune-ini M2 UI parsing (`tests/ui.rs`).
;
; Trimmed and adapted from the real Speeduino `speeduino.ini`
; (GPL-3, https://github.com/noisymime/speeduino, file
; `reference/speeduino.ini`), which is itself the authoritative source per
; ADR-0006 (real firmware source over proprietary spec PDFs). Lines below
; are copied close-to-verbatim (whitespace/comments trimmed) from that file
; to exercise every construct sub-step 3.1 requires:
;
;   - `[Menu]`: a `menu = "&Tuning"` (label with a `&` mnemonic marker,
;     stripped) containing plain `subMenu = name, "Title"` items and one
;     `subMenu = inj_trimad_B, "Sequential fuel trim (5-8)", 9, { nFuelChannels >= 5 }`
;     carrying BOTH a trailing page number and a `{cond}` — the real line
;     this parser must tolerate per the brief. A `subMenu = std_separator`
;     line (no title, no representable target) is included to exercise
;     graceful skipping.
;   - `[UserDefined]`: a `dialog = engine_constants_southwest, "Speeduino Board"`
;     with a plain `field = "Label", constName` (visible=None), a
;     `field = "Label", constName, { cond }` (visible=Some, the required
;     assertion case), a `field = "Label", constName, {}, { cond }` 4-arg
;     form (tolerated — the trailing brace is the condition, the `{}` is a
;     placeholder, per hyper-tuner's own handling of this exact real line),
;     a `slider = "Label", constName, horizontal, { cond }` (references a
;     bound constant — degrades faithfully to `FieldKind::Constant`, same
;     as a plain `field`), and a `commandButton = "Label", cmdName, { cond }`
;     (not representable by any frozen `FieldKind` — must degrade to a
;     `Diagnostic`, not a field).
;   - `[TableEditor]`: a `table = veTable1Tbl, veTable1Map, "VE Table", 2`
;     with `xBins`/`yBins`/`zBins` referencing real constant names.
;   - `[CurveEditor]`: a `curve = time_accel_tpsdot_curve, "TPS based AE"`
;     with `xBins`/`yBins` referencing real constant names.
;
; `[Constants]` below defines every name the dialog/table/curve reference,
; so the happy-path parse of this fixture produces zero cross-reference
; diagnostics (the missing-constant-reference case is exercised separately
; in `tests/ui.rs` via a small inline INI string, not here).

[MegaTune]
   signature            = "speeduino 202504-dev"
   queryCommand         = "Q"
   versionInfo          = "S"
   pageActivationDelay  = 10
   blockReadTimeout     = 2000
   interWriteDelay      = 10
   blockingFactor       = 251
   endianness           = little
   messageEnvelopeFormat = msEnvelope_1.0
   ochGetCommand        = "r"
   pageReadCommand      = "p%2i%2o%2c"
   pageValueWrite       = "M%2i%2o%2c%v"
   burnCommand          = "b%2i"

[Constants]
    endianness      = little
    nPages          = 1
    pageSize        = 64

page = 1
      injLayout     = scalar, U08,       0,        "",         1.0,       0.0,   0.0,    3,         0
      nFuelChannels = scalar, U08,       1,        "",         1.0,       0.0,   0.0,    8,         0
      inj4CylPairing= scalar, U08,       2,        "",         1.0,       0.0,   0.0,    1,         0
      cmdVSSratio1  = scalar, U08,       3,        "",         1.0,       0.0,   0.0,    255,       0
      FILTER_FLEX   = scalar, U08,      16,        "",         1.0,       0.0,   0.0,    255,       0
      rpmBins       = array,  U08,       4, [4],   "RPM",      100.0,     0.0,   0.0,    25500,     0
      fuelLoadBins  = array,  U08,       8, [4],   "kPa",      2.0,       0.0,   0.0,    511,       0
      veTable       = array,  U08,      12, [4x4], "%",        1.0,       0.0,   0.0,    255.0,     0
      taeBins       = array,  U08,      28, [4],   "%",        1.0,       0.0,   0.0,    255,       0
      taeRates      = array,  U08,      32, [4],   "%",        1.0,       0.0,   0.0,    255,       0

[Menu]

menuDialog = main

   menu = "&Tuning"
      subMenu = engine_constants,   "Engine Constants"
      subMenu = std_separator
      subMenu = inj_trimad_B,       "Sequential fuel trim (5-8)", 9, { nFuelChannels >= 5 }

[UserDefined]

    dialog = engine_constants_southwest, "Speeduino Board"
        field = "Injector Layout",          injLayout
        field = "Injector Pairing",         inj4CylPairing, { injLayout != 0 }
        field = "AUX Input 0", inj4CylPairing, {}, { injLayout != 0 && nFuelChannels == 4 }
        slider = "Flex sensor filter", FILTER_FLEX, horizontal, { injLayout != 0 }
        commandButton = "Set Gear 1",       cmdVSSratio1, { vssMode > 0 }

[TableEditor]
   ;       table_id,    map3d_id,    "title",      page
   table = veTable1Tbl,  veTable1Map,  "VE Table",   2
      topicHelp = "http://wiki.speeduino.com/en/configuration/VE_table"
      xBins       = rpmBins,  rpm
      yBins       = fuelLoadBins, fuelLoad
      xyLabels    = "RPM", "Fuel Load: "
      zBins       = veTable

[CurveEditor]

;tps-based accel enrichment
      curve = time_accel_tpsdot_curve, "TPS based AE"
            columnLabel = "TPSdot", "Added"
            xAxis = 0, 1200, 6
            yAxis = 0, 250, 4
            xBins = taeBins, TPSdot
            yBins = taeRates
