; SPDX-License-Identifier: GPL-3.0-or-later
;
; Golden fixture for opentune-ini M2 constants/pages parsing
; (`tests/constants.rs`).
;
; Trimmed and adapted from the real Speeduino `speeduino.ini`
; (GPL-3, https://github.com/noisymime/speeduino, file
; `reference/speeduino.ini`), which is itself the authoritative source per
; ADR-0006 (real firmware source over proprietary spec PDFs). Field names,
; syntax, and the `#if`/`#else`/`#endif` gating style are copied verbatim
; from that file; the constant set is trimmed down to one representative
; of each element kind this parser must handle:
;
;   - a scalar with full field list (aseTaperTime)
;   - a bitfield with named options, including "INVALID" (aeMode)
;   - a 1-D array (wueRates)
;   - a 2-D table array whose offset is resolved via `lastOffset` (veTable)
;   - a scalar feeding an expression-scaled sibling (stoich / ego_min_lambda)
;   - a scale/low/high expression constant (`{ 0.1 / stoich }` style, from
;     the real `ego_min_lambda`/`lambdaTable` constants)
;   - a string-type constant (`engineName`) — adapted for coverage: real
;     Speeduino only uses the `string` class inside `[PcVariables]`, but
;     the M2 contract requires `ConstantKind::Text` to be reachable from a
;     page constant too, so one is included here per the brief's fixture
;     requirement.
;   - a `#if`/`#else`/`#endif` gate on a bare symbol (`CELSIUS`) whose
;     branches differ observably (units/scale/low/high), exactly matching
;     the real `aeColdTaperMin` gate's shape. `parse_definition` always
;     preprocesses with an empty active-symbol set, so `CELSIUS` is
;     inactive and the `#else` branch (Fahrenheit) is the one that must
;     survive into the parsed `Definition`.
;
; `[PcVariables]` below is trimmed from the real file's header stanza to
; exercise the no-offset field order.

[MegaTune]
   signature            = "speeduino 202504-dev"
   queryCommand         = "Q"
   versionInfo          = "S"
   pageActivationDelay  = 10
   blockReadTimeout     = 2000
   interWriteDelay      = 10
   blockingFactor       = 251
   endianness           = little
   messageEnvelopeFormat = msEnvelope_1.0
   ochGetCommand        = "r"
   pageReadCommand      = "p%2i%2o%2c"
   pageValueWrite       = "M%2i%2o%2c%v"
   burnCommand          = "b%2i"

[PcVariables]
   ; entry format the same as Constants, except there is no offset.
   rpmhigh = scalar,   U16,    "rpm", 1, 0, 0, 30000, 0

[Constants]
    endianness      = little
    nPages          = 1
    pageSize        = 43

page = 1
      aseTaperTime  = scalar, U08,       0,         "S",        0.1,       0.0,   0.0,    25.5,      1
      aeMode        = bits,   U08,       1, [0:1],  "TPS", "MAP", "INVALID", "INVALID"
      wueRates      = array,  U08,       2, [10],   "%",        1.0,       0.0,   0.0,    255,       0
      veTable       = array,  U08, lastOffset, [4x4],  "%",     1.0,       0.0,   0.0,    255.0,     0
      stoich        = scalar, U08,      28,        ":1",        0.1,       0.0,   0.0,     25.5,     1
      ego_min_lambda= scalar, U08, lastOffset, "Lambda", { 0.1 / stoich }, 0, { 7 / stoich }, { 25 / stoich }, 3
#if CELSIUS
      coolantGate   = scalar, U08, lastOffset, "C", 1.0,       -40,    -40,    215,      0
#else
      coolantGate   = scalar, U08, lastOffset, "F", 1.8,    -22.23,    -40,    419,      0
#endif
      engineName    = string, ASCII, lastOffset, 12
