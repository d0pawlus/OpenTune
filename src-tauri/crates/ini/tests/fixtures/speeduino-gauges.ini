;
; Fixture for opentune-ini M3 [GaugeConfigurations] + [FrontPage] parsing
; (tests/gauges.rs).
;
; [MegaTune] carries the full M1 comms field set so `parse_definition`
; (which runs `parse_comms` first) succeeds — same template as
; `speeduino-output-channels.ini`. [OutputChannels] is the trimmed set from
; that fixture so the gauge -> channel cross-reference check has real
; targets. [GaugeConfigurations]/[FrontPage] are trimmed from the real
; Speeduino `speeduino.ini` (GPL-3, https://github.com/noisymime/speeduino
; @ 63fd68e9), extended with three deliberate degradation rows:
;   exprGauge   — `{ rpmhigh }` PcVariable expression in its Hi bound
;   brokenGauge — too few fields (malformed -> Diagnostic, skipped)
;   ghostGauge  — references an output channel that does not exist
;                 (cross-ref Diagnostic, kept)

[MegaTune]
   signature            = "speeduino 202504-dev"
   queryCommand         = "Q"
   versionInfo          = "S"
   pageActivationDelay  = 10
   blockReadTimeout     = 2000
   interWriteDelay      = 10
   blockingFactor       = 251
   endianness           = little
   messageEnvelopeFormat = msEnvelope_1.0
   ochGetCommand        = "r"
   pageReadCommand      = "p%2i%2o%2c"
   pageValueWrite       = "M%2i%2o%2c%v"
   burnCommand          = "b%2i"

[PcVariables]
   rpmhigh = scalar, U16, "RPM", 1.000, 0.000, 100, 30000, 0

[OutputChannels]
ochGetCommand    = "r\$tsCanId\x30%2o%2c"
ochBlockSize     =  16

secl        = scalar, U08,  0, "sec",   1.000, 0.000
engine      = scalar, U08,  2, "bits",  1.000, 0.000
running     = bits,   U08,  2, [0:0]
crank       = bits,   U08,  2, [1:1]
rpm         = scalar, U16,  4, "rpm",   1.000, 0.000
coolantRaw  = scalar, U08,  6, "C",     1.000, 0.000
coolant     = { coolantRaw - 40 }, "C"

[GaugeConfigurations]
gaugeCategory = "Main"
;Name       = Var,     Title,          Units, Lo,  Hi,   LoD, LoW, HiW,  HiD,  vd, ld
tachometer  = rpm,     "Engine Speed", "RPM", 0,   8000, 300, 600, 7000, 7500, 0,  0
cltGauge    = coolant, "Coolant",      "C",   -40, 215,  -15, 1,   95,   105,  0,  0

gaugeCategory = "Sensors"
exprGauge   = rpm,     "Expr Bound",   "RPM", 0,   { rpmhigh }, 300, 600, 7000, 7500, 1, 0
brokenGauge = rpm,     "Broken"
ghostGauge  = nosuchvar, "Ghost",      "x",   0,   100,  0,   0,   90,   95,   0,  0

[FrontPage]
gauge1 = tachometer
gauge2 = cltGauge
indicator = { running }, "Not Running", "Running", white, black, green, black
indicator = { crank },   "Not Cranking", "Cranking", white, black, black, white
