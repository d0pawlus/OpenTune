;
; Minimal fixture — only the strictly-required keys, no optional ones.
; Used to verify that parse_comms fills in sensible defaults for optional
; fields (pageActivationDelay, interWriteDelay, endianness, envelope).

[MegaTune]
   signature            = "test ECU v1.0"
   queryCommand         = "Q"
   versionInfo          = "S"
   blockReadTimeout     = 1500
   blockingFactor       = 121
   ochGetCommand        = "A"
   pageReadCommand      = "r%2i%2o%2c"
   pageValueWrite       = "w%2i%2o%2c%v"
   burnCommand          = "b%2i"
