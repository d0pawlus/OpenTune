name: Release

on:
  push:
    tags:
      - 'v*'

# One run per tag; a re-pushed tag queues behind (never cancels) a run that
# may be mid-upload.
concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # Create the draft release ONCE, before the matrix. Letting each leg
  # find-or-create it was a race: drafts are invisible to
  # GET /releases/tags/:tag, so near-simultaneous legs (the two macos ones
  # especially) could both see "no release yet" and create duplicate drafts
  # with the assets split between them. Legs now only upload. This job also
  # fails fast — before any build minutes are spent — when the tag does not
  # match the app version.
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Guard tag against app version
        run: |
          app_version="$(jq -r .version src-tauri/tauri.conf.json)"
          if [ "${GITHUB_REF_NAME#v}" != "$app_version" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match tauri.conf.json version $app_version — bump package.json, src-tauri/Cargo.toml and src-tauri/tauri.conf.json together, then re-tag"
            exit 1
          fi
      - name: Create the draft release (re-runs reuse the existing one)
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing="$(gh api "repos/$GITHUB_REPOSITORY/releases" --paginate \
            --jq '.[] | select(.tag_name == env.GITHUB_REF_NAME) | .id')"
          if [ -n "$existing" ]; then
            echo "release for $GITHUB_REF_NAME already exists — legs will upload into it"
          else
            gh release create "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --draft \
              --title "OpenTune $GITHUB_REF_NAME" \
              --notes 'Unsigned macOS and Windows release. Updater artifacts are cryptographically signed; Apple notarization and Windows publisher signing are deferred until the project owner obtains the required accounts and certificates.'
            existing="$(gh api "repos/$GITHUB_REPOSITORY/releases" --paginate \
              --jq '.[] | select(.tag_name == env.GITHUB_REF_NAME) | .id')"
          fi
          echo "release_id=$(printf '%s\n' "$existing" | head -n 1)" >> "$GITHUB_OUTPUT"

  build-release:
    needs: prepare
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest # Intel
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04 # older glibc baseline for wider distro compat
            args: ''
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      # Actions pinned to full commit SHAs — supply-chain: this job holds
      # contents: write and builds the installers users run. Update the SHA and
      # its trailing version comment together.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false # keep the write-token out of .git/config (npm ci / build.rs run untrusted code)
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: 20, cache: npm }
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable # required once pinned by SHA — no ref name left to imply it
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - name: Install Linux Tauri deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libudev-dev xdg-utils
      - run: npm ci
      # The pinned official action builds, signs updater archives, merges the
      # four platform entries into latest.json, and uploads to the one draft
      # created above. Apple/Windows publisher signing is deliberately absent.
      - uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.prepare.outputs.release_id }}
          tagName: ${{ github.ref_name }}
          releaseDraft: true
          prerelease: false
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}

  verify-release:
    needs: [prepare, build-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - name: Verify updater manifest, signatures, and installer coverage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ needs.prepare.outputs.release_id }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          # Draft releases expose API asset URLs. Normalize them to the stable,
          # public download URLs that the updater can use after publication.
          manifest_dir="$(mktemp -d)"
          gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" \
            --pattern latest.json --dir "$manifest_dir"
          gh api \
            "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID/assets?per_page=100" \
            > "$manifest_dir/assets.json"
          jq --arg repo "$GITHUB_REPOSITORY" --arg tag "$RELEASE_TAG" \
            --slurpfile assets "$manifest_dir/assets.json" '
              .platforms |= with_entries(
                if (.value.url | test("/releases/assets/[0-9]+$")) then
                  (.value.url | split("/")[-1] | tonumber) as $asset_id |
                  ($assets[0] | map(select(.id == $asset_id)) | first | .name) as $asset_name |
                  if $asset_name == null then
                    error("release asset not found for id \($asset_id)")
                  else
                    .value.url = (
                      "https://github.com/\($repo)/releases/download/\($tag)/\($asset_name | @uri)"
                    )
                  end
                else
                  .
                end
              )
            ' "$manifest_dir/latest.json" > "$manifest_dir/latest.normalized.json"
          mv "$manifest_dir/latest.normalized.json" "$manifest_dir/latest.json"
          gh release upload "$RELEASE_TAG" "$manifest_dir/latest.json" \
            --repo "$GITHUB_REPOSITORY" --clobber

          assets="$(gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" \
            --json assets --jq '.assets[].name')"
          [ "$(printf '%s\n' "$assets" | grep -cE '\.dmg$')" -ge 2 ]
          printf '%s\n' "$assets" | grep -qE '(_setup\.exe|setup\.exe)$'
          printf '%s\n' "$assets" | grep -qE '\.msi$'
          printf '%s\n' "$assets" | grep -qE '\.AppImage$'
          printf '%s\n' "$assets" | grep -qE '\.deb$'
          printf '%s\n' "$assets" | grep -qE '\.rpm$'
          [ "$(printf '%s\n' "$assets" | grep -cE '\.sig$')" -ge 4 ]
          printf '%s\n' "$assets" | grep -qx latest.json

          release_dir="$(mktemp -d)"
          gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" \
            --dir "$release_dir"
          jq -e '
            . as $manifest |
            .version == "0.2.0" and
            (["darwin-aarch64", "darwin-x86_64", "linux-x86_64", "windows-x86_64"] |
              all(. as $platform |
                ($manifest.platforms[$platform].url | startswith("https://")) and
                ($manifest.platforms[$platform].signature | length > 0)))
          ' "$release_dir/latest.json"

          jq -r '.plugins.updater.pubkey' src-tauri/tauri.conf.json \
            > "$release_dir/updater.pub"
          for platform in darwin-aarch64 darwin-x86_64 linux-x86_64 windows-x86_64; do
            artifact_name="$(jq -r --arg platform "$platform" \
              '.platforms[$platform].url | split("/")[-1]' \
              "$release_dir/latest.json")"
            artifact="$release_dir/$artifact_name"
            signature="$artifact.sig"
            [ -f "$artifact" ]
            [ -f "$signature" ]
            manifest_signature="$(jq -r --arg platform "$platform" \
              '.platforms[$platform].signature' "$release_dir/latest.json")"
            [ "$(tr -d '\r\n' < "$signature")" = "$manifest_signature" ]
            cargo run --manifest-path src-tauri/Cargo.toml \
              -p opentune-updater-verify -- \
              "$release_dir/updater.pub" "$artifact" "$signature"
          done

          (
            cd "$release_dir"
            find . -maxdepth 1 -type f \
              ! -name SHA256SUMS ! -name updater.pub -print0 \
              | sort -z | xargs -0 shasum -a 256
          ) > "$release_dir/SHA256SUMS"
          gh release upload "$RELEASE_TAG" "$release_dir/SHA256SUMS" \
            --repo "$GITHUB_REPOSITORY" --clobber
