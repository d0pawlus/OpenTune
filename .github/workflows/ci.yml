name: CI
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # Actions pinned to full commit SHAs — supply-chain: this workflow runs
      # on every push/PR and executes untrusted-ish build steps (npm ci, cargo
      # build/clippy) with only read access. Update the SHA and its version
      # comment together.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false # keep the token out of .git/config (npm ci / build.rs run untrusted code)
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: 20, cache: npm }
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable # required once pinned by SHA — no ref name left to imply it
          components: "clippy, rustfmt"
      - name: Install Linux Tauri deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libudev-dev
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run test
      - run: npm run rust:fmt
      - run: npm run rust:clippy
      # The `opentune` app crate's test binary transitively links the Tauri
      # Windows GUI stack but ships without the application manifest (Common
      # Controls v6) that tauri-build embeds only into the real app binary, so
      # it aborts at process startup with STATUS_ENTRYPOINT_NOT_FOUND
      # (0xc0000139). Its tests (tauri-specta binding generation + command-level
      # integration) are OS-independent and still run on Linux/macOS; the sub-
      # crates don't link Tauri, so they run everywhere. See tauri-apps/tauri
      # discussion #11179.
      - name: Rust tests (full workspace)
        if: matrix.os != 'windows-latest'
        run: npm run rust:test
      - name: Rust tests (Windows — exclude Tauri app crate)
        if: matrix.os == 'windows-latest'
        run: cargo test --workspace --exclude opentune --manifest-path src-tauri/Cargo.toml
      - run: npm run build
      - run: cargo build --workspace --manifest-path src-tauri/Cargo.toml
